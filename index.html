    body {
      font-weight: 100;
      margin: 0;
      padding: 0;
      background-image: url('https://mp-a68a848e-4cc9-48ac-94e0-2dcbfb062ad0.cdn.bspapp.com/cloudstorage/屏幕截图_2023-08-02_115344 (1).png');

      text-align: center;
      color: #2b76d3b5;
      font-size: 16px;
    }

    #baizao {
           /////display: flex
      justify-content: space-between;
      align-items: flex-start;
      height: 360px;
      margin-left: 20px;
      margin-right: 20px;
    }

    #empty-space {
      flex-grow: 1;
    }

    .expand-button {
		outline: none !important;
		-webkit-tap-highlight-color: transparent;
      font-size: 30px;
      padding: 8px 16px;
      background-color: #3498db;
      color: #fff;
      border: none;
      cursor: pointer;
      position: static;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s, opacity 0.3s, box-shadow 0.3s;
      outline: none;
    }

    .expand-button:hover {
      animation: expandShrink 0.5s;
      opacity: 0.8;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    }

    .expand-button:focus {
      outline: none;
      /* 取消点击按钮出现的蓝色边框 */
    }

    @keyframes expandShrink {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
      }
    }

    @media screen and (max-width: 320px) and (max-height: 360px) {
      .expand-button {
		  outline: none !important;
		  -webkit-tap-highlight-color: transparent;
		  webkit-tap-highlight-color: rgba(255, 255, 255, 0);
		  webkit-user-select: none;
		-moz-user-focus: none;
		  -moz-user-select: none;
		outline:none;
        padding: 16px 32px;
        font-size: 24px;
        border-radius: 30px;
      }
    }
  </style>
